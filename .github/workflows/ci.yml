name: ci

# Concurrency correctness depends on the hardware memory model, so the matrix spans BOTH
# x64 (TSO) and arm64 (weak memory) — arm64 is where the ConcurrentBPlusTree torn-read / NRE
# bug only manifested. PR runs are bounded for speed; the nightly soak runs much longer.

on:
  push:
    branches: [ main, master, blink-rewrite ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x64 }      # Linux x64  (TSO)
          - { os: ubuntu-24.04-arm, arch: arm64 }    # Linux arm64 (weak memory)
          - { os: macos-14,         arch: arm64 }    # Apple silicon (weak memory) — the bug's arch
          - { os: windows-latest,   arch: x64 }      # Windows x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: build
        run: dotnet build tests/LockFreeSkipList.Tests/LockFreeSkipList.Tests.csproj -c Release
      # Skip list + bptree only (B-link is unmaintained / excluded from the shipped surface and
      # has independently-flaky concurrency tests).
      - name: test (bounded stress + linearizability)
        env:
          STRESS_SECONDS: '1'
          LIN_ROUNDS: '500'
        run: >
          dotnet test tests/LockFreeSkipList.Tests/LockFreeSkipList.Tests.csproj
          -c Release --no-build
          --filter "FullyQualifiedName!~BLinkTree"

  soak:
    name: nightly soak ${{ matrix.os }} (${{ matrix.arch }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04-arm, arch: arm64 }
          - { os: macos-14,         arch: arm64 }
          - { os: ubuntu-latest,    arch: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: build
        run: dotnet build tests/LockFreeSkipList.Tests/LockFreeSkipList.Tests.csproj -c Release
      - name: heavy stress + linearizability (TieredCompilation off)
        env:
          STRESS_SECONDS: '5'
          LIN_ROUNDS: '8000'
          DOTNET_TieredCompilation: '0'
        run: >
          dotnet test tests/LockFreeSkipList.Tests/LockFreeSkipList.Tests.csproj
          -c Release --no-build
          --filter "FullyQualifiedName!~BLinkTree"

  pack:
    name: pack (nupkg artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: pack Mobratil.Collections
        run: dotnet pack src/Mobratil.Collections/Mobratil.Collections.csproj -c Release -o ./artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*nupkg
